name: email-triage-env
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent triages an email inbox
  by classifying each email as urgent, normal, or spam.
tags:
  - openenv
  - email
  - triage
  - nlp

observation_space:
  type: object
  fields:
    email_id: string
    subject: string
    body: string
    sender: string
    emails_remaining: integer
    current_score: float

action_space:
  type: object
  fields:
    label:
      type: string
      enum: [urgent, normal, spam]

reward:
  type: float
  range: [0.0, 1.0]
  description: "1.0 for correct label, 0.3 for close miss, 0.0 for wrong"

tasks:
  - id: easy
    name: Basic Email Sorting
    difficulty: easy
    description: Sort 3 emails correctly
  - id: medium
    name: Mixed Inbox Triage
    difficulty: medium
    description: Sort 5 emails with ambiguous cases
  - id: hard
    name: Full Inbox Management
    difficulty: hard
    description: Sort all 8 emails accurately